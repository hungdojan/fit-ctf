    max_nof_users: 3
    cluster.scenario_configs:
      template:
        service_configs:
          template_service:
            port_map:
              mongodb: 27017
            env_map:
              ADMIN: admin
              PASSWORD: password
            volume_map:
              example_map:
                src_path: "{{ scenario_dir }}/volumes/file_example"
                template_params: {}

  - name: prj2
