$id: "https://github.com/hungdojan/FIT_CTF/schemas/v1/setup.yaml"
$schema: "https://json-schema.org/draft/2020-12/schema"
type: object
title: Quick project, users and enrollment setup file
properties:
  projects:
    description: |
      A list of projects that will be created if they don't exist in the database.
    type: array
    items:
      $ref: "#/$defs/project_item"
  users:
    type: array
    description: |
      A list of users that will be created if they don't exist in the database.
    items:
      $ref: "#/$defs/user_item"
  enrollments:
    type: array
    description: |
      A list of enrollments that will be applied if both project and user is found.
    items:
      $ref: "#/$defs/enrollment_item"

$defs:
  project_item:
    type: object
    properties:
      name:
        type: string
      max_nof_users:
        type: integer
      starting_port_bind:
        type: integer
        default: -1
      description:
        type: string
        default: ""
      "cluster.scenario_configs":
        type: object
        patternProperties:
          ".*":
            $ref: "#/$defs/scenario_configs"
    required:
      - name
      - max_nof_users
      - "cluster.scenario_configs"

  user_item:
    type: object
    properties:
      username:
        type: string
      email:
        type: string
        default: ""
      role:
        type: string
        enum: ["user", "admin"]
        default: "user"
      generate_password:
        type: boolean
    required: ["username"]
    oneOf:
      - properties:
          password:
            type: string
        required: ["password"]
      - properties:
          generate_password:
            type: boolean
            const: true
        required: ["generate_password"]

  enrollment_item:
    type: object
    properties:
      project:
        type: string
      user:
        type: string
      progress:
        $ref: "#/$defs/user_progress"
      "cluster.scenario_configs":
        type: object
        patternProperties:
          ".*":
            $ref: "#/$defs/scenario_configs"
    required:
      - project
      - user
      - progress
      - "cluster.scenario_configs"

  user_progress:
    type: object
    properties:
      secrets:
        type: object
        patternProperties:
          ".*":
            $ref: "#/$defs/secret"
      found_secrets:
        type: integer
      last_submit_time:
        type: ["string", "null"]
        format: date-time
    required:
      - secrets
      - last_submit_time
      - found_secrets

  secret:
    type: object
    properties:
      value:
        type: string
      submitted:
        type: ["string", "null"]
        format: date-time
      user:
        type: ["string", "null"]

  scenario_configs:
    type: object
    properties:
      dynamic_secrets:
        type: object
        patternProperties:
          ".*":
            type: string
      service_configs:
        type: object
        patternProperties:
          ".*":
            $ref: "#/$defs/service_config"
    required:
      - service_configs

  service_config:
    type: object
    properties:
      env_map:
        type: object
        patternProperties:
          ".*":
            type: string
      port_map:
        type: object
        patternProperties:
          ".*":
            type: integer
      volume_map:
        type: object
        patternProperties:
          ".*":
            $ref: "#/$defs/volume_map"

  volume_map:
    type: object
    properties:
      src_path:
        type: string
      template_params:
        type: object
        patternProperties:
          "^(?!.*__)(?!.*_vmap_).+$":
            type: string
    required:
      - src_path
      - template_params
