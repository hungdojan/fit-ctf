$id: "https://github.com/hungdojan/fit-ctf/schemas/v1/user.yaml"
$schema: "https://json-schema.org/draft/2020-12/schema"
type: object
title: User document schema
properties:
  _id:
    type: string
  username:
    type: string
  password:
    type: string
  role:
    type: string
    enum: ["user", "admin"]
  email:
    type: string
  active:
    type: boolean
  sessions:
    type: array
    items:
      $ref: "#/$def/login_session"


required:
  - _id
  - username
  - password
  - role

$defs:
  login_session:
    type: object
    properties:
      timestamp:
        type: string
        format: date-time
      state:
        enum:
          - LOGIN
          - LOGOUT
      info:
        type: object
        additionalProperties: true
