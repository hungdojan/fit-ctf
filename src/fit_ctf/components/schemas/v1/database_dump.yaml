$id: "https://github.com/hungdojan/fit-ctf/schemas/v1/database_dump.yaml"
$schema: "https://json-schema.org/draft/2020-12/schema"
type: object
title: Exported project database dump
properties:
  project:
    $ref: "#/$defs/project"
  project_cluster:
    anyOf:
      - type: "null"
      - $ref: "#/$defs/project_cluster_item"
  users:
    type: array
    items:
      $ref: "#/$defs/user_item"
  modules:
    type: array
    items:
      type: string
  enrollments:
    type: array
    items:
      $ref: "#/$defs/user_enrollment_item"
  clusters:
    type: array
    items:
      $ref: "#/$defs/cluster_item"
  scenarios:
    type: array
    items:
      $ref: "#/$defs/scenario_export_item"

required:
  - project
  - users
  - modules
  - enrollments

$defs:
  project:
    type: object
    properties:
      name:
        type: string
      description:
        type: string
      active:
        type: boolean
      max_nof_users:
        type: integer
      max_of_users:
        type: integer
      starting_port_bind:
        type: integer
    required:
      - name
      - active
  user_item:
    type: object
    properties:
      username:
        type: string
      password:
        type: string
      email:
        type: string
      role:
        type: string
      active:
        type: boolean
    required:
      - username
      - password
  user_enrollment_item:
    type: object
    properties:
      user:
        type: string
      project:
        type: string
      enrollment_id:
        type: string
      container_port:
        type: integer
      forwarded_port:
        type: integer
      networks:
        type: object
      services:
        type: object
      progress:
        $ref: "#/$defs/user_progress"
    required:
      - user
      - project
      - progress
  user_progress:
    type: object
    properties:
      solved_secrets:
        type: object
        patternProperties:
          ".*":
            $ref: "#/$defs/solved_secret_export"
      submission_log:
        type: array
        items:
          $ref: "#/$defs/submission_log_entry"
      found_secrets:
        type: integer
      last_submit_time:
        type: ["string", "null"]
        format: date-time
    required:
      - solved_secrets
      - submission_log
      - found_secrets
      - last_submit_time
  solved_secret_export:
    type: object
    properties:
      cluster_kind:
        type: string
        enum: ["user", "project"]
      scenario_name:
        type: string
      local_name:
        type: string
      submitted_at:
        type: string
        format: date-time
      user:
        type: ["string", "null"]
      value_at_submit:
        type: ["string", "null"]
    required:
      - cluster_kind
      - scenario_name
      - local_name
      - submitted_at
  submission_log_entry:
    type: object
    properties:
      value:
        type: string
      timestamp:
        type: string
        format: date-time
    required:
      - value
      - timestamp
  project_cluster_item:
    type: object
    properties:
      name:
        type: string
      scenario_configs:
        type: object
        patternProperties:
          ".*":
            $ref: "https://github.com/hungdojan/fit-ctf/schemas/v1/setup.yaml#/$defs/scenario_configs"
    required:
      - name
      - scenario_configs
  cluster_item:
    type: object
    properties:
      name:
        type: string
      enrollment_ref:
        type: string
        pattern: "^[^@]+@[^@]+$"
      scenario_configs:
        type: object
        patternProperties:
          ".*":
            $ref: "https://github.com/hungdojan/fit-ctf/schemas/v1/setup.yaml#/$defs/scenario_configs"
    required:
      - name
      - enrollment_ref
      - scenario_configs
  scenario_export_item:
    type: object
    properties:
      name:
        type: string
    required:
      - name
