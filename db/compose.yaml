name: ctf_backend

services:
  mongodb:
    image: docker.io/library/mongo:7.0
    container_name: ctf-database-mongo
    restart: unless-stopped
    env_file:
      - path: ../.env
        required: true
      # create .admin_env from admin_env_example file
      - path: .admin_env
        required: true
    environment:
      MONGO_INITDB_ROOT_USERNAME: "${DB_ADMIN_USERNAME}"
      MONGO_INITDB_ROOT_PASSWORD: "${DB_ADMIN_PASSWORD}"
      MONGO_INITDB_DATABASE: "${DB_NAME}"
      MONGO_APP_USERNAME: "${DB_USERNAME}"
      MONGO_APP_PASSWORD: "${DB_PASSWORD}"
    ports:
      - "27017:27017"
    networks:
      fit-ctf-net: {}
    volumes:
      - mongo_data:/data/db:z
      - ./mongodb-quadlet/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro

volumes:
  mongo_data:

networks:
  fit-ctf-net: {}
